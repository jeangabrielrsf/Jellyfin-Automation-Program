services:
  db:
    image: postgres:15-alpine
    restart: always
    init: true
    stop_grace_period: 10s
    environment:
      POSTGRES_DB: jellyfin_automation
      POSTGRES_USER: jfa_user
      POSTGRES_PASSWORD: jfa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jfa_user -d jellyfin_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    init: true
    stop_grace_period: 10s
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jfa_user:jfa_password@db:5432/jellyfin_automation
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      OMDB_API_KEY: ${OMDB_API_KEY:-}
      JACKETT_URL: ${JACKETT_URL:-http://jackett:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY:-}
      QBITTORRENT_HOST: ${QBITTORRENT_HOST:-http://qbittorrent:8080}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      JELLYFIN_URL: ${JELLYFIN_URL:-http://host.docker.internal:8096}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      MOVIES_PATH: ${MOVIES_PATH:-/mnt/d/Filmes}
      SERIES_PATH: ${SERIES_PATH:-/mnt/d/Séries}
      ANIMES_PATH: ${ANIMES_PATH:-/mnt/d/Animes}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /mnt:/mnt
      - ./backend/logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    restart: always
    build: ./frontend
    init: true
    stop_grace_period: 10s
    ports:
      - "3001:80"
    depends_on:
      - backend

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend

  adguard:
    image: adguard/adguardhome:latest
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "3000:3000"
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
      - TZ=America/Sao_Paulo
    volumes:
      - ./qbittorrent/config:/config
      - ${TORRENTS_PATH:-/mnt/d/Torrents}:/downloads
      - ${MOVIES_PATH:-/mnt/d/Filmes}:${MOVIES_PATH:-/mnt/d/Filmes}
      - ${SERIES_PATH:-/mnt/d/Séries}:${SERIES_PATH:-/mnt/d/Séries}
      - ${ANIMES_PATH:-/mnt/d/Animes}:${ANIMES_PATH:-/mnt/d/Animes}
    ports:
      - "8082:8080"
      - "6881:6881"
      - "6881:6881/udp"

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./jackett/config:/config
      - ${TORRENTS_PATH:-/mnt/d/Torrents}:/downloads
    ports:
      - "9117:9117"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: always
    init: true
    stop_grace_period: 10s
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    shm_size: "2gb"

volumes:
  postgres_data:
