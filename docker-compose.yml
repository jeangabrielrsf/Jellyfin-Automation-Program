services:
  db:
    image: postgres:15-alpine
    init: true
    stop_grace_period: 10s
    environment:
      POSTGRES_DB: jellyfin_automation
      POSTGRES_USER: jfa_user
      POSTGRES_PASSWORD: jfa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jfa_user -d jellyfin_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    init: true
    stop_grace_period: 10s
    environment:
      DATABASE_URL: postgresql://jfa_user:jfa_password@db:5432/jellyfin_automation
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      JACKETT_URL: ${JACKETT_URL:-http://jackett:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY:-}
      QBITTORRENT_HOST: ${QBITTORRENT_HOST:-http://host.docker.internal:8080}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-jeanfrusca}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-VamosCodar!96}
      JELLYFIN_URL: ${JELLYFIN_URL:-http://jellyfin:8096}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      MOVIES_PATH: /movies
      SERIES_PATH: /series
      ANIMES_PATH: /animes
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${MOVIES_PATH:-./media/movies}:/movies
      - ${SERIES_PATH:-./media/series}:/series
      - ${ANIMES_PATH:-./media/animes}:/animes
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    init: true
    stop_grace_period: 10s
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
