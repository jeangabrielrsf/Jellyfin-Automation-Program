services:
  db:
    image: postgres:15-alpine
    restart: always
    init: true
    stop_grace_period: 10s
    environment:
      POSTGRES_DB: jellyfin_automation
      POSTGRES_USER: jfa_user
      POSTGRES_PASSWORD: jfa_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jfa_user -d jellyfin_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    network_mode: "host"
    restart: always
    init: true
    stop_grace_period: 10s
    environment:
      DATABASE_URL: postgresql://jfa_user:jfa_password@localhost:5432/jellyfin_automation
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      JACKETT_URL: ${JACKETT_URL:-http://localhost:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY:-}
      QBITTORRENT_HOST: ${QBITTORRENT_HOST:-http://localhost:8080}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-jeanfrusca}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-VamosCodar!96}
      JELLYFIN_URL: ${JELLYFIN_URL:-http://localhost:8096}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      MOVIES_PATH: ${MOVIES_PATH:-/mnt/d/Filmes}
      SERIES_PATH: ${SERIES_PATH:-/mnt/d/Séries}
      ANIMES_PATH: ${ANIMES_PATH:-/mnt/d/Animes}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /mnt:/mnt
      - ./backend/logs:/app/logs

  frontend:
    restart: always
    build: ./frontend
    init: true
    stop_grace_period: 10s
    ports:
      - "3001:80"
    depends_on:
      - backend

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: always
    init: true
    stop_grace_period: 10s
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    shm_size: "2gb"

volumes:
  postgres_data:
